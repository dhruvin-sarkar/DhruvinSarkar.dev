<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DX-Ball</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #dx-ball {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }

      .status {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #d6e1ff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 12px;
        z-index: 5;
        max-width: min(90vw, 680px);
        line-height: 1.35;
      }

      .status.error {
        color: #ffb7b7;
      }

      .status.success {
        color: #9ce2b0;
      }

      .status button {
        margin-top: 8px;
        margin-right: 8px;
        border: 1px solid #7f97d8;
        background: #2f426d;
        color: #fff;
        border-radius: 7px;
        cursor: pointer;
        font-size: 12px;
        padding: 6px 10px;
      }
    </style>
  </head>
  <body>
    <div class="status" id="status">Loading DX-Ball assets...</div>
    <canvas id="dx-ball"></canvas>

    <script>
      const statusEl = document.getElementById("status");

      function setStatus(message, type = "") {
        if (!statusEl) return;
        statusEl.className = `status ${type}`.trim();
        statusEl.innerHTML = message;
      }

      async function getResourceInfo(url) {
        try {
          const response = await fetch(url, { method: "HEAD", cache: "no-store" });
          return {
            ok: response.ok,
            status: response.status,
            contentType: (response.headers.get("content-type") || "").toLowerCase(),
          };
        } catch {
          return {
            ok: false,
            status: 0,
            contentType: "",
          };
        }
      }

      function looksLikeJavaScriptContentType(contentType = "") {
        return (
          contentType.includes("javascript") ||
          contentType.includes("ecmascript") ||
          contentType.includes("application/octet-stream")
        );
      }

      function looksLikeImageContentType(contentType = "") {
        return contentType.startsWith("image/");
      }

      function isHtmlFallbackContentType(contentType = "") {
        return contentType.includes("text/html");
      }

      function getBasePrefix() {
        const marker = "/games/dxball/";
        const index = window.location.pathname.toLowerCase().lastIndexOf(marker);

        if (index === -1) return "/";

        return window.location.pathname.slice(0, index + 1) || "/";
      }

      function loadScript(url) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = url;
          script.onload = resolve;
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      async function start() {
        const basePrefix = getBasePrefix();
        const localGameScript = `${basePrefix}games/dxball/game.js`;
        const remoteGameScript = "https://dustinbrett.com/Program%20Files/DX-Ball/game.js";
        const localBasePath = `${basePrefix}games/dxball`;
        const remoteBasePath = "https://dustinbrett.com/Program%20Files/DX-Ball";

        const localScriptInfo = await getResourceInfo(localGameScript);
        const localSpriteInfo = await getResourceInfo(`${localBasePath}/images/mbbkgrnd.png`);
        const localScriptExists =
          localScriptInfo.ok &&
          !isHtmlFallbackContentType(localScriptInfo.contentType) &&
          looksLikeJavaScriptContentType(localScriptInfo.contentType);
        const localSpriteExists =
          localSpriteInfo.ok &&
          !isHtmlFallbackContentType(localSpriteInfo.contentType) &&
          looksLikeImageContentType(localSpriteInfo.contentType);

        let usingLocalScript = false;

        try {
          if (localScriptExists) {
            await loadScript(localGameScript);
            usingLocalScript = true;
          } else {
            await loadScript(remoteGameScript);
          }
        } catch {
          if (localScriptExists) {
            try {
              await loadScript(remoteGameScript);
            } catch {
              setStatus(
                `Unable to load DX-Ball runtime.\n<button id="retry-btn">Retry</button><button id="external-btn">Open Externally</button>`,
                "error"
              );
              document
                .getElementById("retry-btn")
                ?.addEventListener("click", () => window.location.reload());
              document.getElementById("external-btn")?.addEventListener("click", () =>
                window.open("https://dustinbrett.com/", "_blank", "noopener,noreferrer")
              );
              return;
            }
          } else {
            setStatus(
              `Unable to load DX-Ball runtime.\n<button id="retry-btn">Retry</button><button id="external-btn">Open Externally</button>`,
              "error"
            );
            document.getElementById("retry-btn")?.addEventListener("click", () => window.location.reload());
            document.getElementById("external-btn")?.addEventListener("click", () =>
              window.open("https://dustinbrett.com/", "_blank", "noopener,noreferrer")
            );
            return;
          }
        }

        if (!window.DXBall || typeof window.DXBall.init !== "function") {
          setStatus("DX-Ball runtime loaded, but initialization API is missing.", "error");
          return;
        }

        window.DXBall.basePath = usingLocalScript && localSpriteExists ? localBasePath : remoteBasePath;

        window.DXBall.init(
          () => {
            setStatus("DX-Ball ready", "success");
            setTimeout(() => {
              if (statusEl) statusEl.style.display = "none";
            }, 1300);
          },
          () => ""
        );

        window.addEventListener("beforeunload", () => {
          try {
            window.DXBall.close?.();
          } catch {
            // no-op
          }
        });
      }

      start();
    </script>
  </body>
</html>
