<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DX-Ball</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #dxball {
        width: 100%;
        height: 100%;
      }

      .status {
        position: absolute;
        top: 10px;
        left: 10px;
        color: #d6e1ff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 12px;
        z-index: 5;
      }
    </style>
  </head>
  <body>
    <div class="status" id="status">Loading DX-Ball assets...</div>
    <div id="dxball"></div>
    <script src="https://dustinbrett.com/Program%20Files/DX-Ball/game.js"></script>
    <script>
      const statusEl = document.getElementById("status");

      function setStatus(message) {
        if (statusEl) statusEl.textContent = message;
      }

      if (!window.DXBall) {
        setStatus("Unable to initialize DX-Ball runtime.");
      } else {
        window.DXBall.init(
          () => setStatus("DX-Ball ready"),
          () => ""
        );
      }
    </script>
  </body>
</html>
