<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commander Keen 4 - js-dos</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: #ebf2ff;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        overflow: hidden;
      }

      #keen {
        width: 100%;
        height: 100%;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        background: rgba(8, 12, 22, 0.92);
      }

      .card {
        width: min(620px, 96vw);
        background: #1b2540;
        border: 1px solid rgba(136, 169, 250, 0.55);
        border-radius: 12px;
        padding: 16px;
      }

      .btn {
        border: 1px solid #6f96f2;
        border-radius: 8px;
        background: #2f4475;
        color: #fff;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .row {
        margin-top: 10px;
        display: flex;
        gap: 10px;
      }

      .note {
        font-size: 12px;
        opacity: 0.9;
        line-height: 1.45;
      }

      .error {
        margin-top: 10px;
        color: #ffb5b5;
        font-size: 12px;
      }

      code {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 4px;
        padding: 1px 4px;
      }
    </style>
  </head>
  <body>
    <div id="keen"></div>
    <div class="overlay" id="overlay"></div>

    <script>
      const overlay = document.getElementById("overlay");
      const container = document.getElementById("keen");

      const marker = "/emulators/";
      const markerIndex = window.location.pathname.toLowerCase().lastIndexOf(marker);
      const basePrefix = markerIndex === -1 ? "/" : window.location.pathname.slice(0, markerIndex + 1) || "/";
      const bundlePath = `${basePrefix}roms/dos/commanderkeen4/keen4.jsdos`;

      function renderCard(content) {
        overlay.innerHTML = `<div class="card">${content}</div>`;
      }

      async function urlExists(url) {
        try {
          const response = await fetch(url, { method: "HEAD", cache: "no-store" });
          return response.ok;
        } catch {
          return false;
        }
      }

      function loadRuntime() {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = "https://v8.js-dos.com/latest/js-dos.js";
          script.onload = resolve;
          script.onerror = () => reject(new Error("Failed to load js-dos runtime."));
          document.head.appendChild(script);
        });
      }

      async function boot() {
        renderCard(`
          <h2 style="margin-top:0">Commander Keen 4</h2>
          <p class="note">Loading bundled game package...</p>
        `);

        const bundleExists = await urlExists(bundlePath);
        if (!bundleExists) {
          renderCard(`
            <h2 style="margin-top:0">Commander Keen 4 bundle not found</h2>
            <p class="note">Expected bundle:</p>
            <p><code>${bundlePath}</code></p>
            <p class="error">Add the bundled <code>keen4.jsdos</code> file and refresh.</p>
            <div class="row">
              <button class="btn" id="reload-btn">Reload</button>
            </div>
          `);
          document.getElementById("reload-btn").addEventListener("click", () => window.location.reload());
          return;
        }

        try {
          await loadRuntime();
          if (!window.Dos) throw new Error("window.Dos is unavailable after runtime load.");
          overlay.remove();
          window.Dos(container, {
            url: bundlePath,
            autoStart: true,
            kiosk: true,
          });
        } catch (error) {
          renderCard(`
            <h2 style="margin-top:0">Unable to start Commander Keen 4</h2>
            <p class="error">${error?.message || "Unknown js-dos initialization error."}</p>
            <div class="row">
              <button class="btn" id="retry-btn">Retry</button>
            </div>
          `);
          document.getElementById("retry-btn").addEventListener("click", () => window.location.reload());
        }
      }

      boot();
    </script>
  </body>
</html>
