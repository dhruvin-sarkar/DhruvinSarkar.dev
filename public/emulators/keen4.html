<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commander Keen 4</title>
    <link rel="stylesheet" href="./win95-ui.css" />
  </head>
  <body class="win95-screen">
    <div id="keen"></div>
    <div class="win95-overlay" id="overlay"></div>

    <script>
      const RETRO_APP_SOURCE = "retro-app";
      const overlay = document.getElementById("overlay");
      const container = document.getElementById("keen");
      const params = new URLSearchParams(window.location.search);
      const appInstance = params.get("retroAppInstance") || "";
      const runtimeTitle = "Commander Keen 4";
      let readySent = false;

      const marker = "/emulators/";
      const markerIndex = window.location.pathname.toLowerCase().lastIndexOf(marker);
      const basePrefix = markerIndex === -1 ? "/" : window.location.pathname.slice(0, markerIndex + 1) || "/";
      const bundlePath = `${basePrefix}roms/dos/commanderkeen4/keen4.jsdos`;
      const runtimeUrl = "https://v8.js-dos.com/latest/js-dos.js";

      function postToParent(type, detail = {}) {
        try {
          window.parent?.postMessage(
            {
              source: RETRO_APP_SOURCE,
              type,
              appInstance,
              title: runtimeTitle,
              ...detail,
            },
            "*",
          );
        } catch {
          // Ignore cross-origin messaging errors.
        }
      }

      function markReady() {
        if (readySent) return;
        readySent = true;
        overlay.classList.add("hidden");
        postToParent("retro-app:ready");
      }

      function renderDialog({ heading, message, error = "", status = "", actions = "", icon = "i" }) {
        overlay.classList.remove("hidden");
        overlay.innerHTML = `
          <div class="win95-dialog">
            <div class="win95-titlebar">
              <span class="win95-titlebar-text">${runtimeTitle}</span>
            </div>
            <div class="win95-body">
              <div class="win95-row">
                <div class="win95-icon ${error ? "warning" : ""}">${icon}</div>
                <div class="win95-copy">
                  <h1>${heading}</h1>
                  <p>${message}</p>
                  ${error ? `<p class="win95-error">${error}</p>` : ""}
                </div>
              </div>
              <div class="win95-progress"><div class="win95-progress-bar is-indeterminate"></div></div>
              ${status ? `<div class="win95-status">${status}</div>` : ""}
              ${actions ? `<div class="win95-button-row">${actions}</div>` : ""}
            </div>
          </div>
        `;

        overlay.querySelector("#reload-btn")?.addEventListener("click", () => window.location.reload());
        overlay.querySelector("#retry-btn")?.addEventListener("click", () => window.location.reload());
      }

      function renderFailure(message, detail) {
        postToParent("retro-app:error", {
          message,
          error: detail || "Unknown Commander Keen 4 startup failure.",
        });
        renderDialog({
          heading: "Commander Keen 4 could not start",
          message,
          error: detail || "Unknown Commander Keen 4 startup failure.",
          icon: "!",
          status: bundlePath,
          actions: '<button class="win95-button" id="retry-btn">Retry</button>',
        });
      }

      async function assetExists(url) {
        try {
          const response = await fetch(url, {
            method: "GET",
            cache: "no-store",
            headers: { Range: "bytes=0-0" },
          });

          if (!(response.ok || response.status === 206)) {
            return false;
          }

          const contentType = (response.headers.get("content-type") || "").toLowerCase();
          return !contentType.includes("text/html");
        } catch {
          return false;
        }
      }

      function loadRuntime() {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = runtimeUrl;
          script.onload = () => {
            if (!window.Dos) {
              reject(new Error("Legacy js-dos runtime did not expose window.Dos."));
              return;
            }
            resolve();
          };
          script.onerror = () => reject(new Error("Failed to load remote js-dos runtime."));
          document.head.appendChild(script);
        });
      }

      function installErrorGuards() {
        window.addEventListener("error", (event) => {
          if (readySent) return;
          renderFailure(
            "The bundled DOS runtime crashed during boot.",
            event?.message || event?.error?.message || "Unknown runtime crash.",
          );
        });

        window.addEventListener("unhandledrejection", (event) => {
          if (readySent) return;
          const reason = event?.reason;
          renderFailure(
            "The bundled DOS runtime rejected a startup promise.",
            typeof reason === "string" ? reason : reason?.message || reason?.stack || "Unknown promise rejection.",
          );
        });
      }

      async function boot() {
        postToParent("retro-app:title", { title: runtimeTitle });
        postToParent("retro-app:loading", { message: "Preparing Commander Keen 4" });

        renderDialog({
          heading: "Loading bundled DOS package",
          message: "Starting Commander Keen 4 from the preconfigured archive.",
          status: bundlePath,
        });

        const bundleExists = await assetExists(bundlePath);
        if (!bundleExists) {
          renderDialog({
            heading: "Bundled game not found",
            message: "Place the packaged Keen 4 archive at the path below.",
            error: "The launcher could not find keen4.jsdos.",
            status: bundlePath,
            icon: "!",
            actions: '<button class="win95-button" id="reload-btn">Reload</button>',
          });
          postToParent("retro-app:error", {
            message: "Commander Keen 4 bundle not found.",
            error: bundlePath,
          });
          return;
        }

        installErrorGuards();

        try {
          await loadRuntime();
          container.focus?.();
          const dosInstance = window.Dos(container);

          dosInstance
            .run(bundlePath)
            .then((ci) => {
              window.ci = ci;
              markReady();
            })
            .catch((error) => {
              renderFailure(
                "The bundled DOS runtime returned an error instead of launching the game.",
                error?.message || "Unknown js-dos startup error.",
              );
            });
        } catch (error) {
          renderFailure(
            "The bundled DOS runtime did not initialize correctly.",
            error?.message || "Unknown js-dos initialization error.",
          );
        }
      }

      boot();
    </script>
  </body>
</html>
