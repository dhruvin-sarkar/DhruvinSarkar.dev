<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commander Keen 4 - js-dos</title>
    <link rel="stylesheet" href="./win95-ui.css" />
  </head>
  <body class="win95-screen">
    <div id="keen"></div>
    <div class="win95-overlay" id="overlay"></div>

    <script>
      const overlay = document.getElementById("overlay");
      const container = document.getElementById("keen");

      const marker = "/emulators/";
      const markerIndex = window.location.pathname.toLowerCase().lastIndexOf(marker);
      const basePrefix = markerIndex === -1 ? "/" : window.location.pathname.slice(0, markerIndex + 1) || "/";
      const bundlePath = `${basePrefix}roms/dos/commanderkeen4/keen4.jsdos`;

      function showOverlay() {
        overlay.classList.remove("hidden");
        container.style.visibility = "hidden";
      }

      function hideOverlay() {
        overlay.classList.add("hidden");
        container.style.visibility = "visible";
      }

      function renderDialog({ heading, message, error = "", status = "", actions = "", icon = "i" }) {
        showOverlay();
        overlay.innerHTML = `
          <div class="win95-dialog">
            <div class="win95-titlebar">
              <span class="win95-titlebar-text">Commander Keen 4</span>
            </div>
            <div class="win95-body">
              <div class="win95-row">
                <div class="win95-icon ${error ? "warning" : ""}">${icon}</div>
                <div class="win95-copy">
                  <h1>${heading}</h1>
                  <p>${message}</p>
                  ${error ? `<p class="win95-error">${error}</p>` : ""}
                </div>
              </div>
              <div class="win95-progress"><div class="win95-progress-bar is-indeterminate"></div></div>
              ${status ? `<div class="win95-status">${status}</div>` : ""}
              ${actions ? `<div class="win95-button-row">${actions}</div>` : ""}
            </div>
          </div>
        `;

        if (overlay.querySelector("#reload-btn")) {
          overlay.querySelector("#reload-btn").addEventListener("click", () => window.location.reload());
        }

        if (overlay.querySelector("#retry-btn")) {
          overlay.querySelector("#retry-btn").addEventListener("click", () => window.location.reload());
        }
      }

      function renderJsdosFailure(message) {
        renderDialog({
          heading: "Commander Keen 4 could not start",
          message: "The bundled DOS runtime returned an error instead of launching the game.",
          error: message || "Unknown js-dos runtime error.",
          icon: "!",
          status: bundlePath,
          actions: '<button class="win95-button" id="retry-btn">Retry</button>',
        });
      }

      function normalizeErrorText(text) {
        return (text || "")
          .split(/\r?\n+/)
          .map((line) => line.trim())
          .filter(Boolean)
          .join(" ");
      }

      function inspectRuntimeDom() {
        if (container.querySelector("canvas")) {
          hideOverlay();
          return;
        }

        const text = normalizeErrorText(container.innerText);
        if (!text) return;

        const looksLikeJsdosFailure =
          /oops\.\.\.\s*something went wrong/i.test(text) ||
          /broken bundle/i.test(text) ||
          /\.jsdos/i.test(text) ||
          /dosbox\.conf/i.test(text) ||
          /runtime error/i.test(text);

        if (!looksLikeJsdosFailure) return;

        const detailedMessage =
          text.match(/broken bundle[^.]*\.[^.]*/i)?.[0] ||
          text.match(/dosbox\.conf[^.]*not found/i)?.[0] ||
          text.replace(/oops\.\.\.\s*something went wrong\.?/i, "").trim() ||
          text;

        renderJsdosFailure(detailedMessage);
      }

      async function urlExists(url) {
        try {
          const response = await fetch(url, { method: "HEAD", cache: "no-store" });
          return response.ok;
        } catch {
          return false;
        }
      }

      function loadRuntime() {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = "https://v8.js-dos.com/latest/js-dos.js";
          script.onload = resolve;
          script.onerror = () => reject(new Error("Failed to load js-dos runtime."));
          document.head.appendChild(script);
        });
      }

      async function boot() {
        const runtimeObserver = new MutationObserver(() => inspectRuntimeDom());
        runtimeObserver.observe(container, {
          childList: true,
          subtree: true,
          characterData: true,
        });

        renderDialog({
          heading: "Loading bundled DOS package",
          message: "Starting Commander Keen 4 from the preconfigured archive.",
          status: bundlePath,
        });

        const bundleExists = await urlExists(bundlePath);
        if (!bundleExists) {
          renderDialog({
            heading: "Bundled game not found",
            message: "Place the packaged Keen 4 archive at the path below.",
            error: "The launcher could not find keen4.jsdos.",
            status: bundlePath,
            icon: "!",
            actions: '<button class="win95-button" id="reload-btn">Reload</button>',
          });
          return;
        }

        try {
          await loadRuntime();
          if (!window.Dos) throw new Error("window.Dos is unavailable after runtime load.");
          hideOverlay();
          window.Dos(container, {
            url: bundlePath,
            autoStart: true,
            kiosk: true,
          });
        } catch (error) {
          renderDialog({
            heading: "Unable to start Commander Keen 4",
            message: "The bundled DOS runtime did not initialize correctly.",
            error: error?.message || "Unknown js-dos initialization error.",
            icon: "!",
            actions: '<button class="win95-button" id="retry-btn">Retry</button>',
          });
        }
      }

      boot();
    </script>
  </body>
</html>
