<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmulatorJS Loader</title>
    <link rel="stylesheet" href="./win95-ui.css" />
  </head>
  <body class="win95-screen">
    <div id="game"></div>
    <div class="win95-overlay" id="overlay"></div>

    <script>
      const RETRO_APP_SOURCE = "retro-app";
      const CORE_MAP = {
        n64: "n64",
        ps1: "pcsx_rearmed",
        mednafen_psx_hw: "mednafen_psx_hw",
        pcsx_rearmed: "pcsx_rearmed",
        "3ds": "citra",
        citra: "citra",
        gba: "mgba",
        mgba: "mgba",
        nes: "fceumm",
        fceumm: "fceumm",
      };

      const CORE_LABELS = {
        n64: "Nintendo 64",
        mednafen_psx_hw: "PlayStation",
        pcsx_rearmed: "PlayStation",
        citra: "Nintendo 3DS",
        mgba: "Game Boy Advance",
        fceumm: "Nintendo Entertainment System",
      };

      const CORE_PROBE_FILES = {
        n64: "cores/mupen64plus_next-wasm.data",
        mednafen_psx_hw: "cores/mednafen_psx_hw-wasm.data",
        pcsx_rearmed: "cores/pcsx_rearmed-wasm.data",
        citra: "cores/citra-wasm.data",
        mgba: "cores/mgba-wasm.data",
        fceumm: "cores/fceumm-wasm.data",
      };

      const CDN_DATA_PATH = "https://cdn.emulatorjs.org/stable/data/";
      const params = new URLSearchParams(window.location.search);
      const requestedCore = (params.get("core") || "nes").toLowerCase();
      const core = CORE_MAP[requestedCore] || "fceumm";
      const systemLabel = CORE_LABELS[core] || "Emulator";
      const rom = params.get("rom") || "";
      const bios = params.get("bios") || "";
      const runtimeTitle = params.get("title") || systemLabel;
      const appInstance = params.get("retroAppInstance") || "";
      const overlay = document.getElementById("overlay");
      const gameRoot = document.getElementById("game");
      let readySent = false;
      let monitorInterval = null;
      let monitorObserver = null;

      function postToParent(type, detail = {}) {
        try {
          window.parent?.postMessage(
            {
              source: RETRO_APP_SOURCE,
              type,
              appInstance,
              title: runtimeTitle,
              ...detail,
            },
            "*",
          );
        } catch {
          // Ignore cross-origin messaging errors.
        }
      }

      function stopMonitoring() {
        if (monitorInterval) {
          clearInterval(monitorInterval);
          monitorInterval = null;
        }
        if (monitorObserver) {
          monitorObserver.disconnect();
          monitorObserver = null;
        }
      }

      function markReady() {
        if (readySent) return;
        readySent = true;
        stopMonitoring();
        overlay?.classList.add("hidden");
        postToParent("retro-app:ready");
      }

      function getBasePrefix() {
        const marker = "/emulators/";
        const index = window.location.pathname.toLowerCase().lastIndexOf(marker);
        if (index === -1) return "/";
        const prefix = window.location.pathname.slice(0, index + 1);
        return prefix || "/";
      }

      const BASE_PREFIX = getBasePrefix();
      const LOCAL_DATA_PATH = `${BASE_PREFIX}emulators/emulatorjs/data/`;

      function toAbsoluteUrl(value) {
        try {
          return new URL(value, window.location.href).toString();
        } catch {
          return value;
        }
      }

      async function assetExists(url) {
        try {
          const isBlobUrl = String(url || "").startsWith("blob:");
          const response = await fetch(url, isBlobUrl
            ? {
                method: "GET",
                cache: "no-store",
              }
            : {
                method: "GET",
                cache: "no-store",
                headers: { Range: "bytes=0-0" },
              });

          if (isBlobUrl) {
            return response.ok;
          }

          if (!(response.ok || response.status === 206)) {
            return false;
          }

          const contentType = (response.headers.get("content-type") || "").toLowerCase();
          return !contentType.includes("text/html");
        } catch {
          return false;
        }
      }

      function renderDialog({ heading, message, status = "", error = "", actions = "", icon = "i" }) {
        overlay.innerHTML = `
          <div class="win95-dialog">
            <div class="win95-titlebar">
              <span class="win95-titlebar-text">${runtimeTitle}</span>
            </div>
            <div class="win95-body">
              <div class="win95-row">
                <div class="win95-icon ${error ? "warning" : ""}">${icon}</div>
                <div class="win95-copy">
                  <h1>${heading}</h1>
                  <p>${message}</p>
                  ${error ? `<p class="win95-error">${error}</p>` : ""}
                </div>
              </div>
              <div class="win95-progress"><div class="win95-progress-bar is-indeterminate"></div></div>
              ${status ? `<div class="win95-status">${status}</div>` : ""}
              ${actions ? `<div class="win95-button-row">${actions}</div>` : ""}
            </div>
          </div>
        `;
      }

      function renderError(message, detail = "Check the selected ROM, emulator data files, and network path.") {
        stopMonitoring();
        postToParent("retro-app:error", { message, error: detail });
        renderDialog({
          heading: "Unable to launch emulator",
          message,
          error: detail,
          icon: "!",
          actions: '<button class="win95-button" id="retry-btn">Retry</button>',
        });

        const retryButton = document.getElementById("retry-btn");
        if (retryButton) {
          retryButton.addEventListener("click", () => window.location.reload());
        }
      }

      async function resolveDataPath() {
        const probe = CORE_PROBE_FILES[core];
        if (!probe) return CDN_DATA_PATH;
        if (core === "citra") {
          return null;
        }
        const localProbe = `${LOCAL_DATA_PATH}${probe}`;
        const hasLocalCore = await assetExists(localProbe);
        return hasLocalCore ? LOCAL_DATA_PATH : CDN_DATA_PATH;
      }

      function inspectRuntimeDom() {
        const canvas = gameRoot.querySelector("canvas");
        if (canvas && (canvas.width > 0 || canvas.height > 0 || canvas.clientWidth > 0 || canvas.clientHeight > 0)) {
          markReady();
          return;
        }

        const runtimeText = (gameRoot.innerText || "")
          .split(/\r?\n+/)
          .map((line) => line.trim())
          .filter(Boolean)
          .join(" ");

        if (!runtimeText) return;

        if (/(error|failed|missing|not found|unable|could not|abort)/i.test(runtimeText)) {
          renderError(`The ${systemLabel} runtime reported an error.`, runtimeText);
        }
      }

      function startMonitoring() {
        if (monitorInterval || monitorObserver) return;

        monitorInterval = window.setInterval(inspectRuntimeDom, 150);
        monitorObserver = new MutationObserver(() => inspectRuntimeDom());
        monitorObserver.observe(gameRoot, {
          childList: true,
          subtree: true,
          characterData: true,
        });
      }

      function installErrorGuards() {
        window.addEventListener("error", (event) => {
          if (readySent) return;
          const message = event?.message || event?.error?.message || "The emulator runtime crashed during boot.";
          renderError(`The ${systemLabel} core failed to initialize.`, message);
        });

        window.addEventListener("unhandledrejection", (event) => {
          if (readySent) return;
          const reason = event?.reason;
          const detail =
            typeof reason === "string"
              ? reason
              : reason?.message || reason?.stack || "The emulator runtime rejected a startup promise.";
          renderError(`The ${systemLabel} core failed to initialize.`, detail);
        });
      }

      async function injectLoader(dataPath) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = `${dataPath}loader.js`;
          script.onload = () => resolve();
          script.onerror = () => reject(new Error(`Failed to load emulator runtime from ${dataPath}.`));
          document.body.appendChild(script);
        });
      }

      async function boot() {
        postToParent("retro-app:title", { title: runtimeTitle });
        postToParent("retro-app:loading", { message: `Preparing ${runtimeTitle}` });

        if (!rom) {
          renderDialog({
            heading: "No game selected",
            message: "Return to the ROM library and choose a bundled game.",
            error: "No ROM path was passed to the emulator loader.",
            icon: "!",
            actions: '<button class="win95-button" id="retry-btn">Reload</button>',
          });
          document.getElementById("retry-btn")?.addEventListener("click", () => window.location.reload());
          postToParent("retro-app:error", {
            message: "No ROM was selected for the emulator.",
            error: "No ROM path was passed to the emulator loader.",
          });
          return;
        }

        const romUrl = toAbsoluteUrl(rom);
        const romOrigin = new URL(romUrl, window.location.origin).origin;
        if (romOrigin === window.location.origin) {
          const romExists = await assetExists(romUrl);
          if (!romExists) {
            renderError("The selected ROM could not be found.", romUrl);
            return;
          }
        }

        if (core === "mednafen_psx_hw" && !bios) {
          renderError(
            "The Hardware Accurate PlayStation 1 BIOS URL is not configured.",
            "This specific core requires an SCPH-5501 BIOS. PCSX Rearmed (Standard) does not.",
          );
          return;
        }

        const dataPath = await resolveDataPath();
        if (!dataPath && core === "citra") {
          renderError(
            "Nintendo 3DS is not currently available in the EmulatorJS web build.",
            "The library and proxy manifest can stay in place, but EmulatorJS currently lists the Citra core as unavailable for browser deployments.",
          );
          return;
        }
        renderDialog({
          heading: "Preparing emulator",
          message: "Loading runtime and selected cartridge.",
          status: `Core: ${core} | Data path: ${dataPath}`,
        });

        window.EJS_player = "#game";
        window.EJS_core = core;
        window.EJS_gameUrl = romUrl;
        window.EJS_pathtodata = dataPath;
        window.EJS_color = "#000080";
        window.EJS_backgroundColor = "#000000";
        window.EJS_language = "en-US";
        window.EJS_disableAutoLang = false;
        window.EJS_startOnLoaded = true;
        window.EJS_autostart = true;
        window.EJS_loadStateURL = undefined;
        window.EJS_AdUrl = "";
        window.EJS_AdTimer = 0;
        window.EJS_AdModal = false;
        window.EJS_Settings = {
          "save-state-location": "keep",
        };

        if (bios) {
          console.log('[DEBUG] biosUrl being set:', bios);
          window.EJS_biosUrl = toAbsoluteUrl(bios);
        }

        console.log('[DEBUG] biosUrl:', window.EJS_biosUrl);
        console.log('[DEBUG] romUrl:', window.EJS_gameUrl);

        installErrorGuards();
        startMonitoring();

        try {
          await injectLoader(dataPath);
          inspectRuntimeDom();
        } catch (error) {
          renderError(`Failed to load emulator runtime from ${dataPath}.`, error?.message || "Unknown loader.js error.");
        }
      }

      boot();
    </script>
  </body>
</html>
