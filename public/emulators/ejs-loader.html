<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EmulatorJS Loader</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 20% 20%, #1f2942 0%, #11182b 55%, #070b16 100%);
        color: #e6ecff;
      }

      #game {
        width: 100%;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(8, 12, 21, 0.92);
        z-index: 20;
      }

      .overlay.hidden {
        display: none;
      }

      .panel {
        width: min(620px, 95vw);
        background: rgba(25, 33, 56, 0.94);
        border: 1px solid rgba(126, 153, 233, 0.55);
        border-radius: 12px;
        padding: 18px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 20px;
      }

      p {
        margin: 0 0 10px;
        font-size: 13px;
        line-height: 1.45;
        opacity: 0.92;
      }

      code {
        background: rgba(0, 0, 0, 0.25);
        border-radius: 4px;
        padding: 1px 5px;
      }

      .actions {
        margin-top: 12px;
        display: flex;
        gap: 8px;
      }

      .btn {
        border: 1px solid #5f81d9;
        border-radius: 8px;
        background: #2b3c68;
        color: #f3f7ff;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .btn:hover {
        background: #3a4a78;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div class="overlay" id="overlay">
      <div class="panel">
        <h1>Preparing emulator...</h1>
        <p>Please wait while EmulatorJS loads.</p>
      </div>
    </div>

    <script>
      const CORE_MAP = {
        n64: "n64",
        ps1: "mednafen_psx_hw",
        mednafen_psx_hw: "mednafen_psx_hw",
        gba: "mgba",
        mgba: "mgba",
        nes: "fceumm",
        fceumm: "fceumm",
      };

      const CORE_PROBE_FILES = {
        n64: "cores/n64-wasm.data",
        mednafen_psx_hw: "cores/mednafen_psx_hw-wasm.data",
        mgba: "cores/gba-wasm.data",
        fceumm: "cores/nes-wasm.data",
      };

      const CDN_DATA_PATH = "https://cdn.emulatorjs.org/stable/data/";
      const params = new URLSearchParams(window.location.search);
      const requestedCore = (params.get("core") || "nes").toLowerCase();
      const core = CORE_MAP[requestedCore] || "fceumm";
      const rom = params.get("rom") || "";
      const bios = params.get("bios") || "";
      const overlay = document.getElementById("overlay");

      function getBasePrefix() {
        const marker = "/emulators/";
        const index = window.location.pathname.toLowerCase().lastIndexOf(marker);
        if (index === -1) return "/";
        const prefix = window.location.pathname.slice(0, index + 1);
        return prefix || "/";
      }

      const BASE_PREFIX = getBasePrefix();
      const LOCAL_DATA_PATH = `${BASE_PREFIX}emulators/emulatorjs/data/`;

      function toAbsoluteUrl(value) {
        try {
          return new URL(value, window.location.href).toString();
        } catch {
          return value;
        }
      }

      async function urlExists(url) {
        try {
          const response = await fetch(url, { method: "HEAD", cache: "no-store" });
          return response.ok;
        } catch {
          return false;
        }
      }

      function renderError(message) {
        overlay.innerHTML = `
          <div class="panel">
            <h1>Unable to launch emulator</h1>
            <p>${message}</p>
            <div class="actions">
              <button class="btn" id="retry-btn">Retry</button>
            </div>
          </div>
        `;
        const retryButton = document.getElementById("retry-btn");
        if (retryButton) {
          retryButton.addEventListener("click", () => window.location.reload());
        }
      }

      async function resolveDataPath() {
        const probe = CORE_PROBE_FILES[core];
        if (!probe) return CDN_DATA_PATH;
        const localProbe = `${LOCAL_DATA_PATH}${probe}`;
        const hasLocalCore = await urlExists(localProbe);
        return hasLocalCore ? LOCAL_DATA_PATH : CDN_DATA_PATH;
      }

      async function boot() {
        if (!rom) {
          renderError("No ROM selected. Return to the ROM library and choose a game.");
          return;
        }

        const romUrl = toAbsoluteUrl(rom);
        const dataPath = await resolveDataPath();

        // Validate core file exists before attempting to load
        const probe = CORE_PROBE_FILES[core];
        if (probe && dataPath === LOCAL_DATA_PATH) {
          const localProbe = `${LOCAL_DATA_PATH}${probe}`;
          const hasCore = await urlExists(localProbe);
          if (!hasCore) {
            // Fallback to CDN silently
            window.EJS_player = "#game";
            window.EJS_core = core;
            window.EJS_gameUrl = romUrl;
            window.EJS_pathtodata = CDN_DATA_PATH;
            window.EJS_color = "#7ea2ff";
            window.EJS_backgroundColor = "#11182b";
            window.EJS_startOnLoaded = true;
            if (bios) {
              window.EJS_biosUrl = toAbsoluteUrl(bios);
            }
            const script = document.createElement("script");
            script.src = `${CDN_DATA_PATH}loader.js`;
            script.onerror = () => {
              renderError(
                `Unable to load emulator from CDN. Try again or check your connection.`,
              );
            };
            document.body.appendChild(script);
            return;
          }
        }

        // Setup EJS globals
        window.EJS_player = "#game";
        window.EJS_core = core;
        window.EJS_gameUrl = romUrl;
        window.EJS_pathtodata = dataPath;
        window.EJS_color = "#7ea2ff";
        window.EJS_backgroundColor = "#11182b";
        window.EJS_startOnLoaded = true;

        if (bios) {
          window.EJS_biosUrl = toAbsoluteUrl(bios);
        }

        // Create MutationObserver to detect when emulator canvas is rendered
        const checkForCanvas = () => {
          const canvas = document.querySelector("#game canvas");
          const overlay = document.getElementById("overlay");
          if (canvas && overlay) {
            overlay.classList.add("hidden");
            return true;
          }
          return false;
        };

        // Setup monitoring for canvas creation
        let canvasCheckInterval = setInterval(checkForCanvas, 100);
        let initStartTime = Date.now();
        let maxInitTime = 30000; // 30 second timeout

        // Fallback timeout - if canvas doesn't appear, show error
        let initTimeout = setTimeout(() => {
          clearInterval(canvasCheckInterval);
          if (!checkForCanvas()) {
            renderError(
              `Emulator failed to initialize. The ${core} core or data files may be unavailable.`,
            );
          }
        }, maxInitTime);

        // Load the emulator loader script
        const script = document.createElement("script");
        script.src = `${dataPath}loader.js`;
        script.onerror = () => {
          clearInterval(canvasCheckInterval);
          clearTimeout(initTimeout);
          renderError(
            `Failed to load emulator runtime from ${dataPath}. Check that emulator data files are available.`,
          );
        };
        document.body.appendChild(script);
      }

      boot();
    </script>
  </body>
</html>
