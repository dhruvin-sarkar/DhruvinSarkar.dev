<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commander Keen 4</title>
    <link rel="stylesheet" href="https://br.cdn.dos.zone/js-dos/nightly/js-dos.css" />
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "MS Sans Serif", Tahoma, sans-serif;
      }

      body {
        position: relative;
      }

      #keen-player {
        width: 100%;
        height: 100%;
      }

      #keen-player canvas {
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }

      .keen-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        color: #f0f0f0;
        z-index: 10;
      }

      .keen-overlay.hidden {
        display: none;
      }

      .keen-card {
        width: min(420px, calc(100% - 48px));
        border: 2px solid #c0c0c0;
        background: #c0c0c0;
        box-shadow: 2px 2px 0 #000;
      }

      .keen-titlebar {
        padding: 4px 8px;
        background: linear-gradient(90deg, #000080, #1084d0);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
      }

      .keen-body {
        padding: 16px;
        color: #111;
        font-size: 14px;
      }

      .keen-status {
        margin-top: 8px;
        color: #333;
        font-size: 12px;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div
      id="keen-player"
      class="jsdos"
      data-lang="en"
      data-url="https://br.cdn.dos.zone/published/br.nctois.KEEN4.jsdos"
      data-config=""
    ></div>
    <div class="keen-overlay" id="overlay">
      <div class="keen-card">
        <div class="keen-titlebar">Commander Keen 4</div>
        <div class="keen-body">
          Loading Commander Keen 4...
          <div class="keen-status">DOS.Zone compatibility loader</div>
        </div>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const appInstance = params.get("retroAppInstance") || "";
      const overlay = document.getElementById("overlay");
      const player = document.getElementById("keen-player");
      let readySent = false;

      function postToParent(type, detail = {}) {
        try {
          window.parent?.postMessage(
            {
              source: "retro-app",
              type,
              appInstance,
              title: "Commander Keen 4",
              ...detail,
            },
            "*",
          );
        } catch {
          // Ignore cross-origin messaging errors.
        }
      }

      function markReady() {
        if (readySent) return;
        readySent = true;
        overlay.classList.add("hidden");
        postToParent("retro-app:ready");
      }

      function fail(message) {
        if (readySent) return;
        postToParent("retro-app:error", {
          message: "Commander Keen 4 could not start.",
          error: message,
        });
        overlay.classList.remove("hidden");
        overlay.innerHTML = `
          <div class="keen-card">
            <div class="keen-titlebar">Commander Keen 4</div>
            <div class="keen-body">
              ${message}
              <div class="keen-status">https://dos.zone/commander-keen4/</div>
            </div>
          </div>
        `;
      }

      postToParent("retro-app:title", { title: "Commander Keen 4" });
      postToParent("retro-app:loading", {
        message: "Loading Commander Keen 4",
      });

      const observer = new MutationObserver(() => {
        const canvas = player.querySelector("canvas");
        const text = (document.body.innerText || "").replace(/\s+/g, " ").trim();
        if (canvas) {
          markReady();
          return;
        }
        if (/oops|something went wrong|panic|could not start/i.test(text)) {
          fail(text);
        }
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true,
        characterData: true,
      });

      window.addEventListener("error", (event) => {
        if (readySent) return;
        fail(event?.message || "Unexpected Commander Keen 4 runtime error.");
      });

      window.addEventListener("unhandledrejection", (event) => {
        if (readySent) return;
        const reason = event?.reason;
        fail(typeof reason === "string" ? reason : reason?.message || "Commander Keen 4 runtime rejected a promise.");
      });

      window.setTimeout(() => {
        if (!readySent) {
          const text = (document.body.innerText || "").replace(/\s+/g, " ").trim();
          fail(text || "Commander Keen 4 did not reach a playable state in time.");
        }
      }, 30000);
    </script>
    <script src="https://dos.zone/js/dynamics.js?id=19ca3c6350c0f1320ad1822643cd3dac"></script>
  </body>
</html>
