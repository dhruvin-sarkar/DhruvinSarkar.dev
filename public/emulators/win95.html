<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows 95 - v86</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        color: #e5edff;
        font-family: Consolas, "Courier New", monospace;
      }

      #screen-container {
        width: 100%;
        height: 100%;
      }

      #screen-container canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      .boot-note {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 5;
        color: #d9e4ff;
        background: rgba(17, 23, 38, 0.75);
        border: 1px solid rgba(122, 152, 222, 0.6);
        padding: 6px 8px;
        font-size: 11px;
      }

      .overlay {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(5, 7, 12, 0.92);
      }

      .panel {
        width: min(620px, 96vw);
        background: #141d32;
        border: 1px solid rgba(123, 160, 245, 0.6);
        border-radius: 10px;
        padding: 16px;
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 20px;
      }

      .panel p {
        margin: 0;
        font-size: 12px;
        line-height: 1.45;
        opacity: 0.92;
      }

      .row {
        margin-top: 12px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        border: 1px solid #7697e7;
        border-radius: 8px;
        background: #2a3f6e;
        color: #fff;
        padding: 8px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      .error {
        margin-top: 10px;
        color: #ffb3b3;
        font-size: 12px;
      }

      code {
        background: rgba(0, 0, 0, 0.25);
        border-radius: 4px;
        padding: 1px 4px;
      }
    </style>
  </head>
  <body>
    <div class="boot-note">Click inside to capture mouse. Press Esc to release.</div>
    <div id="screen-container"></div>
    <div class="overlay" id="overlay"></div>

    <script>
      const overlay = document.getElementById("overlay");
      const marker = "/emulators/";
      const markerIndex = window.location.pathname.toLowerCase().lastIndexOf(marker);
      const basePrefix = markerIndex === -1 ? "/" : window.location.pathname.slice(0, markerIndex + 1) || "/";
      const localV86Path = `${basePrefix}emulators/v86/`;
      const imagePath = `${basePrefix}emulators/win95.img`;

      const scriptCandidates = [
        `${localV86Path}libv86.js`,
        "https://copy.sh/v86/libv86.js",
      ];

      function renderPanel(html) {
        overlay.innerHTML = `<div class="panel">${html}</div>`;
      }

      async function urlExists(url) {
        try {
          const response = await fetch(url, { method: "HEAD", cache: "no-store" });
          return response.ok;
        } catch {
          return false;
        }
      }

      function loadScriptWithGuard(url) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = url;
          script.async = true;
          script.onload = () => {
            if (!window.V86Starter) {
              reject(new Error(`Runtime loaded from ${url}, but window.V86Starter is missing.`));
              return;
            }
            resolve(url);
          };
          script.onerror = () => reject(new Error(`Failed to load script: ${url}`));
          document.body.appendChild(script);
        });
      }

      async function ensureRuntime() {
        let lastError = null;
        for (const url of scriptCandidates) {
          try {
            return await loadScriptWithGuard(url);
          } catch (error) {
            lastError = error;
          }
        }
        throw lastError || new Error("Unable to load v86 runtime.");
      }

      async function boot() {
        renderPanel(`
          <h2>Windows 95 Boot</h2>
          <p>Preparing virtual x86 runtime...</p>
        `);

        const hasImage = await urlExists(imagePath);
        if (!hasImage) {
          renderPanel(`
            <h2>Windows 95 image missing</h2>
            <p class="error">Win95 image not found at <code>/public/emulators/win95.img</code>.</p>
            <p>Place a Win95 disk image there and refresh.</p>
            <div class="row">
              <button class="btn" id="reload-btn">Reload</button>
            </div>
          `);
          document.getElementById("reload-btn").addEventListener("click", () => window.location.reload());
          return;
        }

        let loadedScript = "";
        try {
          loadedScript = await ensureRuntime();
        } catch (error) {
          renderPanel(`
            <h2>V86 runtime failed</h2>
            <p class="error">${error?.message || "Unknown runtime error."}</p>
            <div class="row">
              <button class="btn" id="retry-btn">Retry</button>
            </div>
          `);
          document.getElementById("retry-btn").addEventListener("click", () => window.location.reload());
          return;
        }

        const remoteAssets = loadedScript.startsWith("https://copy.sh/v86/");
        const wasmPath = remoteAssets ? "https://copy.sh/v86/build/v86.wasm" : `${localV86Path}v86.wasm`;
        const biosPath = remoteAssets ? "https://copy.sh/v86/bios/seabios.bin" : `${localV86Path}bios/seabios.bin`;
        const vgaBiosPath = remoteAssets ? "https://copy.sh/v86/bios/vgabios.bin" : `${localV86Path}bios/vgabios.bin`;

        overlay.remove();
        window.emulator = new window.V86Starter({
          wasm_path: wasmPath,
          memory_size: 64 * 1024 * 1024,
          vga_memory_size: 8 * 1024 * 1024,
          screen_container: document.getElementById("screen-container"),
          bios: { url: biosPath },
          vga_bios: { url: vgaBiosPath },
          hda: {
            url: imagePath,
            async: true,
            size: 242 * 1024 * 1024,
          },
          boot_order: 0x2,
          autostart: true,
          mouse: { enabled: true },
          keyboard: { enabled: true },
        });
      }

      boot();
    </script>
  </body>
</html>
