<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows 95 - v86</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      #screen-container {
        width: 100%;
        height: 100%;
      }

      #screen-container canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      .boot-note {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 5;
        color: #d9e4ff;
        background: rgba(17, 23, 38, 0.7);
        border: 1px solid rgba(122, 152, 222, 0.6);
        padding: 6px 8px;
        font-family: Consolas, monospace;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="boot-note">Click inside to capture mouse. Press Esc to release.</div>
    <div id="screen-container"></div>

    <script>
      (function () {
        const script = document.createElement("script");
        script.src = "/emulators/v86/libv86.js";
        script.onerror = () => {
          const fallback = document.createElement("script");
          fallback.src = "https://copy.sh/v86/build/libv86.js";
          fallback.onload = start;
          fallback.onerror = () => {
            document.body.innerHTML = "<pre style='color:#fff;padding:16px'>Failed to load libv86.js</pre>";
          };
          document.body.appendChild(fallback);
        };
        script.onload = start;
        document.body.appendChild(script);

        function start() {
          const imageUrl = "/emulators/win95.img";
          if (!window.V86Starter) {
            document.body.innerHTML = "<pre style='color:#fff;padding:16px'>V86Starter is unavailable.</pre>";
            return;
          }

          window.emulator = new window.V86Starter({
            wasm_path: "/emulators/v86/v86.wasm",
            memory_size: 64 * 1024 * 1024,
            vga_memory_size: 8 * 1024 * 1024,
            screen_container: document.getElementById("screen-container"),
            bios: { url: "/emulators/v86/bios/seabios.bin" },
            vga_bios: { url: "/emulators/v86/bios/vgabios.bin" },
            hda: { url: imageUrl, async: true, size: 242 * 1024 * 1024 },
            boot_order: 0x2,
            autostart: true,
            mouse: { enabled: true },
            keyboard: { enabled: true },
          });

          window.emulator.add_listener("emulator-ready", () => {
            console.log("V86: Windows 95 ready");
          });
        }
      })();
    </script>
  </body>
</html>
