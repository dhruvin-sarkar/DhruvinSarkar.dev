<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows 95 - v86</title>
    <link rel="stylesheet" href="./win95-ui.css" />
    <style>
      body.win95-screen {
        background: #000;
      }
    </style>
  </head>
  <body class="win95-screen">
    <div class="win95-toolbar-note">Click inside to capture the mouse. Press Esc to release it.</div>
    <div id="screen-container"></div>
    <div class="win95-overlay" id="overlay"></div>

    <script>
      const RETRO_APP_SOURCE = "retro-app";
      const params = new URLSearchParams(window.location.search);
      const appInstance = params.get("retroAppInstance") || "";
      const runtimeTitle = "Windows 95";
      const overlay = document.getElementById("overlay");
      const localV86Path = "v86/";
      const imagePath = "win95.img";
      const localScript = `${localV86Path}libv86.js`;
      const remoteScript = "https://copy.sh/v86/libv86.js";
      const remoteProfileUrl = "https://copy.sh/v86/?profile=windows95";

      function postToParent(type, detail = {}) {
        try {
          window.parent?.postMessage(
            {
              source: RETRO_APP_SOURCE,
              type,
              appInstance,
              title: runtimeTitle,
              ...detail,
            },
            "*",
          );
        } catch {
          // Ignore cross-origin messaging errors.
        }
      }

      async function assetExists(url) {
        try {
          const response = await fetch(url, {
            method: "GET",
            cache: "no-store",
            headers: { Range: "bytes=0-0" },
          });

          if (!(response.ok || response.status === 206)) {
            return false;
          }

          const contentType = (response.headers.get("content-type") || "").toLowerCase();
          return !contentType.includes("text/html");
        } catch {
          return false;
        }
      }

      function renderDialog({ heading, message, error = "", status = "", actions = "", icon = "i" }) {
        overlay.innerHTML = `
          <div class="win95-dialog">
            <div class="win95-titlebar">
              <span class="win95-titlebar-text">${runtimeTitle}</span>
            </div>
            <div class="win95-body">
              <div class="win95-row">
                <div class="win95-icon ${error ? "warning" : ""}">${icon}</div>
                <div class="win95-copy">
                  <h1>${heading}</h1>
                  <p>${message}</p>
                  ${error ? `<p class="win95-error">${error}</p>` : ""}
                </div>
              </div>
              <div class="win95-progress"><div class="win95-progress-bar is-indeterminate"></div></div>
              ${status ? `<div class="win95-status">${status}</div>` : ""}
              ${actions ? `<div class="win95-button-row">${actions}</div>` : ""}
            </div>
          </div>
        `;
      }

      function getV86Constructor() {
        return window.V86Starter || window.V86 || null;
      }

      function loadScriptWithGuard(url) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = url;
          script.async = true;
          script.onload = () => {
            const constructor = getV86Constructor();
            if (!constructor) {
              reject(new Error(`Runtime loaded from ${url}, but no browser v86 constructor was exposed.`));
              return;
            }
            resolve({ url, constructor });
          };
          script.onerror = () => reject(new Error(`Failed to load script: ${url}`));
          document.body.appendChild(script);
        });
      }

      async function ensureRuntime() {
        if (await assetExists(localScript)) {
          try {
            return await loadScriptWithGuard(localScript);
          } catch (err) {
            console.warn("local v86 load failed:", err);
          }
        }

        try {
          return await loadScriptWithGuard(remoteScript);
        } catch (err) {
          console.warn("remote v86 load failed:", err);
        }

        renderDialog({
          heading: "v86 runtime unavailable",
          message: "The emulator runtime could not be loaded from the bundled script or the upstream fallback.",
          error: `Expected ${localScript} in public/emulators/v86/.`,
          status: "Download the browser build of libv86.js and place it beside the BIOS files.",
          icon: "!",
          actions: '<button class="win95-button" id="retry-btn">Retry</button>',
        });
        document.getElementById("retry-btn")?.addEventListener("click", () => window.location.reload());
        throw new Error("v86 runtime missing");
      }

      async function boot() {
        postToParent("retro-app:title", { title: runtimeTitle });
        postToParent("retro-app:loading", { message: "Preparing Windows 95" });

        renderDialog({
          heading: "Preparing Windows 95",
          message: "Loading the virtual x86 runtime and disk image.",
          status: imagePath,
        });

        const hasImage = await assetExists(imagePath);
        if (!hasImage) {
          renderDialog({
            heading: "Using hosted Windows 95 profile",
            message: "The local disk image is missing, so the emulator is switching to the hosted Windows 95 profile.",
            error: "win95.img was not found in public/emulators/.",
            status: imagePath,
            icon: "i",
          });
          window.setTimeout(() => {
            postToParent("retro-app:ready", {
              message: "Switching to the hosted Windows 95 profile.",
            });
            window.location.replace(remoteProfileUrl);
          }, 900);
          return;
        }

        let runtime = null;
        try {
          runtime = await ensureRuntime();
        } catch (error) {
          postToParent("retro-app:error", {
            message: "Windows 95 could not start because the emulator runtime did not initialize.",
            error: error?.message || "Unknown runtime error.",
          });
          renderDialog({
            heading: "v86 runtime failed",
            message: "Windows 95 could not start because the emulator runtime did not initialize.",
            error: error?.message || "Unknown runtime error.",
            icon: "!",
            actions: '<button class="win95-button" id="retry-btn">Retry</button>',
          });
          document.getElementById("retry-btn")?.addEventListener("click", () => window.location.reload());
          return;
        }

        const remoteAssets = runtime.url.startsWith("https://copy.sh/v86/");
        const wasmPath = remoteAssets ? "https://copy.sh/v86/build/v86.wasm" : `${localV86Path}v86.wasm`;
        const biosPath = remoteAssets ? "https://copy.sh/v86/bios/seabios.bin" : `${localV86Path}bios/seabios.bin`;
        const vgaBiosPath = remoteAssets ? "https://copy.sh/v86/bios/vgabios.bin" : `${localV86Path}bios/vgabios.bin`;

        window.addEventListener("error", (event) => {
          postToParent("retro-app:error", {
            message: "Windows 95 failed during boot.",
            error: event?.message || event?.error?.message || "Unknown runtime crash.",
          });
        });

        overlay.remove();
        window.emulator = new runtime.constructor({
          wasm_path: wasmPath,
          memory_size: 64 * 1024 * 1024,
          vga_memory_size: 8 * 1024 * 1024,
          screen_container: document.getElementById("screen-container"),
          bios: { url: biosPath },
          vga_bios: { url: vgaBiosPath },
          hda: {
            url: imagePath,
            async: true,
            size: 242 * 1024 * 1024,
          },
          boot_order: 0x2,
          autostart: true,
          mouse: { enabled: true },
          keyboard: { enabled: true },
        });

        postToParent("retro-app:ready");
      }

      boot();
    </script>
  </body>
</html>
