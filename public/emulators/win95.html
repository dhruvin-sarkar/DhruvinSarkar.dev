<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows 95 - v86</title>
    <link rel="stylesheet" href="./win95-ui.css" />
    <style>
      body.win95-screen {
        background: #000;
      }
    </style>
  </head>
  <body class="win95-screen">
    <div class="win95-toolbar-note">Click inside to capture the mouse. Press Esc to release it.</div>
    <div id="screen-container"></div>
    <div class="win95-overlay" id="overlay"></div>

    <script>
      const RETRO_APP_SOURCE = "retro-app";
      const params = new URLSearchParams(window.location.search);
      const appInstance = params.get("retroAppInstance") || "";
      const runtimeTitle = "Windows 95";
      const overlay = document.getElementById("overlay");
      const localV86Path = "v86/";
      const imagePath = "win95.img";
      const localScript = `${localV86Path}libv86.js`;
      const hostedProfileUrl = "https://copy.sh/v86/?profile=windows95";
      let readySent = false;

      function postToParent(type, detail = {}) {
        try {
          window.parent?.postMessage(
            {
              source: RETRO_APP_SOURCE,
              type,
              appInstance,
              title: runtimeTitle,
              ...detail,
            },
            "*",
          );
        } catch {
          // Ignore cross-origin messaging errors.
        }
      }

      async function assetExists(url) {
        try {
          const response = await fetch(url, {
            method: "GET",
            cache: "no-store",
            headers: { Range: "bytes=0-0" },
          });

          if (!(response.ok || response.status === 206)) {
            return false;
          }

          const contentType = (response.headers.get("content-type") || "").toLowerCase();
          return !contentType.includes("text/html");
        } catch {
          return false;
        }
      }

      function markReady(message = "") {
        if (readySent) return;
        readySent = true;
        postToParent("retro-app:ready", message ? { message } : {});
      }

      function renderDialog({
        heading,
        message,
        error = "",
        status = "",
        actions = "",
        icon = "i",
        showProgress = true,
      }) {
        overlay.innerHTML = `
          <div class="win95-dialog">
            <div class="win95-titlebar">
              <span class="win95-titlebar-text">${runtimeTitle}</span>
            </div>
            <div class="win95-body">
              <div class="win95-row">
                <div class="win95-icon ${error ? "warning" : ""}">${icon}</div>
                <div class="win95-copy">
                  <h1>${heading}</h1>
                  <p>${message}</p>
                  ${error ? `<p class="win95-error">${error}</p>` : ""}
                </div>
              </div>
              ${showProgress ? '<div class="win95-progress"><div class="win95-progress-bar is-indeterminate"></div></div>' : ""}
              ${status ? `<div class="win95-status">${status}</div>` : ""}
              ${actions ? `<div class="win95-button-row">${actions}</div>` : ""}
            </div>
          </div>
        `;
      }

      function getV86Constructor() {
        return window.V86Starter || window.V86 || null;
      }

      function loadScriptWithGuard(url) {
        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = url;
          script.async = true;
          script.onload = () => {
            const constructor = getV86Constructor();
            if (!constructor) {
              reject(new Error(`Runtime loaded from ${url}, but no browser v86 constructor was exposed.`));
              return;
            }
            resolve({ url, constructor });
          };
          script.onerror = () => reject(new Error(`Failed to load script: ${url}`));
          document.body.appendChild(script);
        });
      }

      async function ensureRuntime() {
        if (await assetExists(localScript)) {
          return loadScriptWithGuard(localScript);
        }

        renderDialog({
          heading: "v86 runtime unavailable",
          message: "The emulator runtime could not be loaded from the bundled script.",
          error: `Expected ${localScript} in public/emulators/v86/.`,
          status: "Download the browser build of libv86.js and place it beside the BIOS files.",
          icon: "!",
          actions: '<button class="win95-button" id="retry-btn">Retry</button>',
          showProgress: false,
        });
        document.getElementById("retry-btn")?.addEventListener("click", () => window.location.reload());
        throw new Error("v86 runtime missing");
      }

      function installEmbeddedGuards() {
        try {
          const keyboard = navigator.keyboard;
          if (keyboard && typeof keyboard.lock === "function") {
            const originalLock = keyboard.lock.bind(keyboard);
            Object.defineProperty(keyboard, "lock", {
              configurable: true,
              value: (...args) => {
                if (window.top !== window.self) {
                  return Promise.resolve();
                }
                return originalLock(...args);
              },
            });
          }
        } catch {
          // Ignore non-configurable Keyboard API shims.
        }
      }

      function enhanceInjectedUi() {
        const container = document.getElementById("screen-container");
        if (!container) return;

        container.querySelectorAll("button, input[type='button'], input[type='submit']").forEach((element) => {
          element.classList.add("win95-v86-button");
        });

        container.querySelectorAll("input[type='text'], input[type='number']").forEach((element) => {
          element.classList.add("win95-v86-field");
        });

        container.querySelectorAll("label, span, p, div").forEach((element) => {
          if (element.children.length > 0) return;
          const text = (element.textContent || "").trim();
          if (!text) return;

          element.classList.add("win95-v86-label");
          if (/scale:|capture|boots the local image|mouse|theatre|floppy|network/i.test(text)) {
            element.classList.add("win95-v86-toolbar-text");
          }
          if (/booting|hard disk|seabios|findfile|host\.init/i.test(text)) {
            element.classList.add("win95-v86-status-text");
          }
        });
      }

      function watchInjectedUi() {
        enhanceInjectedUi();
        const container = document.getElementById("screen-container");
        if (!container) return;

        const observer = new MutationObserver(() => {
          window.requestAnimationFrame(enhanceInjectedUi);
        });

        observer.observe(container, { childList: true, subtree: true });
      }

      function showMissingImageState() {
        renderDialog({
          heading: "Local Windows 95 image not found",
          message: "The embedded emulator is staying in local compatibility mode because win95.img is missing from public/emulators/.",
          error: "A hosted fallback is available, but it opens separately so the embedded window stays readable and same-origin.",
          status: imagePath,
          icon: "!",
          showProgress: false,
          actions: `
            <button class="win95-button" id="retry-btn">Retry</button>
            <button class="win95-button" id="hosted-btn">Open Hosted Version</button>
          `,
        });

        document.getElementById("retry-btn")?.addEventListener("click", () => window.location.reload());
        document.getElementById("hosted-btn")?.addEventListener("click", () => {
          window.open(hostedProfileUrl, "_blank", "noopener,noreferrer");
        });

        markReady("Local image missing. Showing compatibility dialog.");
      }

      async function boot() {
        postToParent("retro-app:title", { title: runtimeTitle });
        postToParent("retro-app:loading", { message: "Preparing Windows 95" });
        installEmbeddedGuards();

        renderDialog({
          heading: "Preparing Windows 95",
          message: "Loading the virtual x86 runtime and disk image.",
          status: imagePath,
        });

        const hasImage = await assetExists(imagePath);
        if (!hasImage) {
          showMissingImageState();
          return;
        }

        let runtime = null;
        try {
          runtime = await ensureRuntime();
        } catch (error) {
          postToParent("retro-app:error", {
            message: "Windows 95 could not start because the emulator runtime did not initialize.",
            error: error?.message || "Unknown runtime error.",
          });
          renderDialog({
            heading: "v86 runtime failed",
            message: "Windows 95 could not start because the emulator runtime did not initialize.",
            error: error?.message || "Unknown runtime error.",
            icon: "!",
            actions: '<button class="win95-button" id="retry-btn">Retry</button>',
            showProgress: false,
          });
          document.getElementById("retry-btn")?.addEventListener("click", () => window.location.reload());
          return;
        }

        const wasmPath = `${localV86Path}v86.wasm`;
        const biosPath = `${localV86Path}bios/seabios.bin`;
        const vgaBiosPath = `${localV86Path}bios/vgabios.bin`;

        window.addEventListener("error", (event) => {
          postToParent("retro-app:error", {
            message: "Windows 95 failed during boot.",
            error: event?.message || event?.error?.message || "Unknown runtime crash.",
          });
        });

        overlay.remove();
        watchInjectedUi();
        window.emulator = new runtime.constructor({
          wasm_path: wasmPath,
          memory_size: 64 * 1024 * 1024,
          vga_memory_size: 8 * 1024 * 1024,
          screen_container: document.getElementById("screen-container"),
          bios: { url: biosPath },
          vga_bios: { url: vgaBiosPath },
          hda: {
            url: imagePath,
            async: true,
            size: 242 * 1024 * 1024,
          },
          boot_order: 0x2,
          autostart: true,
          mouse: { enabled: true },
          keyboard: { enabled: true },
        });

        markReady();
      }

      boot();
    </script>
  </body>
</html>
